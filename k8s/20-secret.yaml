# Secret for the admin session token.
#
# The first time the cluster boots,
# the server mints an admin session
# token and writes it to
# /var/lib/sbos-a1-erp/admin-token
# (the PVC). This Secret is OPTIONAL
# — it's the canonical source for
# the token across replicas, but
# the server's first-boot behavior
# is to mint + persist to the PVC.
#
# To inject a pre-existing token
# (e.g., from a backup restore):
#   kubectl create secret generic
#     sbos-a1-erp-admin-token
#     --from-file=admin-token=./admin-token
#     -n sbos-a1-erp
# The Deployment will mount this
# Secret as /var/lib/sbos-a1-erp/admin-token,
# overriding the PVC's first-boot
# token.
apiVersion: v1
kind: Secret
metadata:
  name: sbos-a1-erp-admin-token
  namespace: sbos-a1-erp
  labels:
    app.kubernetes.io/name: sbos-a1-erp
    app.kubernetes.io/part-of: armosphera-portfolio
type: Opaque
# The data field is intentionally
# empty — the operator creates the
# Secret manually with
# `kubectl create secret generic` +
# `--from-file`. See the comment
# above + k8s/README.md §"Inject
# a pre-existing admin token".
data: {}
