name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-and-test:
    name: lint, typecheck, format, test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format

      - name: Test
        run: npm test

      - name: l10n-am audit (CLI)
        run: node server/l10n-am/audit-cli.js --quiet

  coverage-gate:
    name: coverage threshold gate (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Node 22+ has --experimental-test-coverage available (GA since
      # 22.0.0). The gate runs the suite with coverage enabled and
      # exits non-zero if any axis drops below the configured
      # threshold (80% lines/funcs, 70% branches by default).
      - name: Coverage threshold gate
        run: npm run coverage:check
