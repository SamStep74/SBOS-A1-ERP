version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    # Severity threshold: open PRs for moderate+, close-and-ignore for low
    # (GitHub doesn't natively support auto-close; Dependabot will simply open the PR and a maintainer triages)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Cross-eng: only opens PRs that pass CI in the target repo